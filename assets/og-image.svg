<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- ⚠️ ASSET: imagem de compartilhamento (Open Graph 1200x630).
       Exporte este SVG para og-image.jpg (ou troque por arte real do cliente). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1116"/>
      <stop offset="1" stop-color="#11161D"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="0%" r="70%">
      <stop offset="0" stop-color="#1A73E8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#1A73E8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- selo -->
  <g transform="translate(80,90)">
    <rect width="430" height="44" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
    <circle cx="28" cy="22" r="12" fill="#fff"/>
    <text x="52" y="29" font-family="Arial, sans-serif" font-size="17" font-weight="600" fill="#fff">Autorizada Google Street View · Trusted</text>
  </g>

  <!-- headline -->
  <text x="80" y="250" font-family="Arial, sans-serif" font-size="68" font-weight="800" fill="#ffffff">Sua empresa por dentro</text>
  <text x="80" y="330" font-family="Arial, sans-serif" font-size="68" font-weight="800" fill="#ffffff">do Google Maps — <tspan fill="#25D366">em 360º</tspan></text>

  <text x="80" y="400" font-family="Arial, sans-serif" font-size="30" fill="#C9D1D9">Tour virtual imersivo no seu perfil. Mais visitas, mais clientes.</text>

  <!-- pílula whatsapp -->
  <g transform="translate(80,460)">
    <rect width="340" height="66" rx="33" fill="#25D366"/>
    <text x="170" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#06351A">QUERO MEU TOUR 360º</text>
  </g>

  <!-- logo -->
  <text x="1120" y="560" text-anchor="end" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff">Supervisão<tspan fill="#1A73E8">360</tspan></text>
</svg>
